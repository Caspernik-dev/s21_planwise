services:
  db:
    image: pgvector/pgvector:pg16
    container_name: kc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kc
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - kc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kc -d kc']
      interval: 5s
      timeout: 5s
      retries: 10

  # Один прогон drizzle-миграций перед стартом приложения.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgres://kc:${POSTGRES_PASSWORD}@db:5432/kc
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  # Приложение: standalone-бандл Next (наружу не публикуем, только за nginx).
  app:
    build:
      context: .
      target: runner
    # Секреты приложения (GigaChat/AUTH) берём из .env.production; шаблон — .env.example.
    env_file:
      - .env.production
    environment:
      # Внутри compose-сети Postgres доступен как db:5432, а не localhost:5433.
      DATABASE_URL: postgres://kc:${POSTGRES_PASSWORD}@db:5432/kc
      HOSTNAME: 0.0.0.0
      PORT: '3000'
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  kc-pgdata:
