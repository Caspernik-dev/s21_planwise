services:
  db:
    image: pgvector/pgvector:pg16
    container_name: kc-postgres
    environment:
      POSTGRES_USER: kc
      POSTGRES_PASSWORD: kc_dev_pwd
      POSTGRES_DB: kc
    ports:
      - '5433:5432'
    volumes:
      - kc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kc -d kc']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kc-pgdata:
